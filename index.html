<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockMaster</title>
    <style>
      :root {
        --blue: #1d4ed8;
        --blue-dark: #0f2f83;
        --white: #ffffff;
        --text: #f8fbff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, var(--blue) 0%, #3b82f6 100%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero {
        text-align: center;
        padding: 3rem 1.5rem;
        max-width: 760px;
      }

      .hero h1 {
        font-size: clamp(2.5rem, 5vw, 3.8rem);
        margin-bottom: 0.75rem;
      }

      .hero p {
        font-size: clamp(1.05rem, 2vw, 1.3rem);
        line-height: 1.6;
        margin-bottom: 2rem;
        color: rgba(255, 255, 255, 0.95);
      }

      .cta {
        display: inline-block;
        padding: 0.95rem 1.65rem;
        border-radius: 999px;
        background: var(--white);
        color: var(--blue-dark);
        text-decoration: none;
        font-weight: 700;
        font-size: 1rem;
        box-shadow: 0 10px 30px rgba(15, 47, 131, 0.25);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .cta:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 36px rgba(15, 47, 131, 0.32);
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <h1>StockMaster</h1>
      <p>Your Inventory Forecasting Supermarket</p>
      <a class="cta" href="next.html">Start Now</a>
    </main>
  </body>
</html>
